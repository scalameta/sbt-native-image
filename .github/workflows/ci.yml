name: CI
on:
  push:
    branches:
      - master
      - main
  pull_request:
jobs:
  native-image:
    name: Compile
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: Fix Windows and macOS support
        os: [ubuntu-latest]
        java: [17]
    steps:
      - uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
          cache: sbt
      - uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 21
      - uses: sbt/setup-sbt@v1
      - name: Setup Windows C++ toolchain
        uses: ilammy/msvc-dev-cmd@v1
        if: ${{ matrix.os == 'windows-2022' }}
      - name: sbt test plugin/scripted
        shell: bash
        run: |
          export GRAALVM_HOME=$JAVA_HOME_21_X64
          export NATIVE_IMAGE_COMMAND=$GRAALVM_HOME/bin/native-image
          sbt test plugin/scripted
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "8"
          cache: "sbt"
      - uses: sbt/setup-sbt@v1
      - run: sbt checkAll
