name: CI
on:
  push:
    branches:
      - master
      - main
  pull_request:
jobs:
  native-image:
    name: Compile
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: Fix Windows and macOS support
        os: [ubuntu-latest]
        java: [8]
    steps:
      - uses: actions/checkout@v6
      - uses: olafurpg/setup-scala@v13
      - uses: sbt/setup-sbt@v1
      - name: Setup Windows C++ toolchain
        uses: ilammy/msvc-dev-cmd@v1
        if: ${{ matrix.os == 'windows-2022' }}
      - name: sbt test plugin/scripted
        shell: bash
        run: |
          export JABBA=/home/runner/bin/jabba
          $JABBA install graalvm@20.2.0
          export GRAALVM_HOME=$($JABBA which --home graalvm@20.2.0)
          $GRAALVM_HOME/bin/gu install native-image
          export NATIVE_IMAGE_COMMAND=$GRAALVM_HOME/bin/native-image
          sbt test plugin/scripted
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "8"
          cache: "sbt"
      - uses: sbt/setup-sbt@v1
      - run: sbt checkAll
